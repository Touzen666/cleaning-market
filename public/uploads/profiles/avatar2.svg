<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hairGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#E6E6FA"/>
  
  <!-- Hair - bob style -->
  <path d="M 20 35 Q 15 25 25 20 Q 35 15 50 20 Q 65 15 75 20 Q 85 25 80 35 Q 75 45 70 50 Q 65 55 60 60 Q 55 65 50 65 Q 45 65 40 60 Q 35 55 30 50 Q 25 45 20 35 Z" fill="url(#hairGradient2)"/>
  <path d="M 25 50 Q 20 55 25 60 Q 30 65 35 60 Q 40 55 45 60 Q 50 65 55 60 Q 60 55 65 60 Q 70 65 75 60 Q 80 55 75 50 Z" fill="url(#hairGradient2)"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="45" rx="18" ry="22" fill="url(#skinGradient2)"/>
  
  <!-- Eyes -->
  <ellipse cx="42" cy="40" rx="3" ry="4" fill="#2F4F4F"/>
  <ellipse cx="58" cy="40" rx="3" ry="4" fill="#2F4F4F"/>
  <ellipse cx="42" cy="39" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="58" cy="39" rx="1.5" ry="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="48" rx="2" ry="3" fill="#DEB887"/>
  
  <!-- Mouth -->
  <path d="M 45 55 Q 50 58 55 55" stroke="#8B0000" stroke-width="2" fill="none"/>
  
  <!-- Earrings -->
  <circle cx="32" cy="45" r="2" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <circle cx="68" cy="45" r="2" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
</svg> 