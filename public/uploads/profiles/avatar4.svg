<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hairGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#E6E6FA"/>
  
  <!-- Hair - longer style -->
  <path d="M 15 30 Q 10 20 20 15 Q 30 10 50 15 Q 70 10 80 15 Q 90 20 85 30 Q 80 40 75 50 Q 70 60 65 70 Q 60 80 50 80 Q 40 80 35 70 Q 30 60 25 50 Q 20 40 15 30 Z" fill="url(#hairGradient4)"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="45" rx="18" ry="22" fill="url(#skinGradient4)"/>
  
  <!-- Eyes -->
  <ellipse cx="42" cy="40" rx="3" ry="4" fill="#2F4F4F"/>
  <ellipse cx="58" cy="40" rx="3" ry="4" fill="#2F4F4F"/>
  <ellipse cx="42" cy="39" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="58" cy="39" rx="1.5" ry="2" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="48" rx="2" ry="3" fill="#DEB887"/>
  
  <!-- Mouth -->
  <path d="M 45 55 Q 50 58 55 55" stroke="#8B0000" stroke-width="2" fill="none"/>
  
  <!-- Casual shirt -->
  <rect x="35" y="65" width="30" height="25" fill="#4169E1"/>
  <rect x="40" y="70" width="20" height="15" fill="#FFFFFF"/>
</svg> 